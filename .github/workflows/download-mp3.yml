name: Download Daily MP3

on:
  schedule:
    - cron: '16 0 * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 👈 只需要這個

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Create mp3 folder
        run: mkdir -p mp3

      - name: Generate date
        id: date
        run: |
          DATE=$(TZ='Asia/Taipei' date +'%Y.%m.%d')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT

      - name: Download MP3
        run: |
          FILE=G-AwakerHeart${{ steps.date.outputs.DATE }}.mp3
          URL=http://streamak0119.akamaized.net/GoodnewsMedia/$FILE

          echo "Downloading $URL"

          curl -f -L \
            -A "Mozilla/5.0" \
            -o "mp3/$FILE" \
            "$URL"

      - name: Verify download
        run: |
          echo "Downloaded files:"
          ls -lh mp3/

      - name: Clean old files (keep latest 7)
        run: |
          cd mp3
          ls -1t *.mp3 2>/dev/null | tail -n +8 | xargs -r rm -f

          echo "Remaining files:"
          ls -lh

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add mp3/

          git diff --cached --quiet && echo "No changes" || git commit -m "Update MP3 files"

          git push origin HEAD:${GITHUB_REF#refs/heads/}
